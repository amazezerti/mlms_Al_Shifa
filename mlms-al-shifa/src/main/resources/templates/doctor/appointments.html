<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>My Appointments</title>
  <style>
    .page-header{margin-bottom:24px;}
    .page-header h4{margin:0;font-size:20px;font-weight:600;}
    .page-header p{margin:4px 0 0;font-size:13px;
      color:var(--muted);}
    .appt-card{background:white;border-radius:14px;
      border:1px solid var(--border);margin-bottom:12px;
      padding:18px 22px;display:flex;align-items:center;
      gap:16px;transition:box-shadow .2s;}
    .appt-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.07);}
    .appt-date{background:#dbeafe;color:#1d4ed8;
      border-radius:10px;padding:10px 16px;text-align:center;
      min-width:70px;flex-shrink:0;}
    .appt-date .day{font-size:22px;font-weight:700;
      line-height:1;}
    .appt-date .mon{font-size:11px;font-weight:500;
      text-transform:uppercase;margin-top:2px;}
    .appt-time{font-size:13px;font-weight:600;
      color:var(--text);margin-bottom:3px;}
    .appt-patient{font-size:13px;color:var(--muted);}
    .appt-reason{font-size:12px;color:var(--muted);
      margin-top:4px;font-style:italic;}
    .empty-state{text-align:center;padding:60px;
      color:var(--muted);}
    .empty-state span{font-size:52px;display:block;
      margin-bottom:12px;}
  </style>
</head>
<body>
<div layout:fragment="content">

  <div class="page-header">
    <h4>My Appointments</h4>
    <p>Patients booked into your schedule</p>
  </div>

  <div th:if="${not #lists.isEmpty(appointments)}">
    <div class="appt-card"
         th:each="slot : ${appointments}">
      <div class="appt-date">
        <div class="day"
             th:text="${#temporals.format(
               slot.slotDate,'dd')}">
          01
        </div>
        <div class="mon"
             th:text="${#temporals.format(
               slot.slotDate,'MMM')}">
          Jan
        </div>
      </div>
      <div style="flex:1;">
        <div class="appt-time"
             th:text="${#temporals.format(
               slot.startTime,'HH:mm')}
               + ' – '
               + ${#temporals.format(
                 slot.endTime,'HH:mm')}">
          09:00 – 09:30
        </div>
        <div class="appt-patient">
          <i class="bi bi-person-fill"></i>
          <span th:if="${slot.bookedPatient != null}"
                th:text="${slot.bookedPatient.fullName}
                          + ' ('
                          + ${slot.bookedPatient
                              .patientCode}
                          + ')'">
            Patient
          </span>
          <span th:if="${slot.bookedPatient == null}"
                style="color:#f59e0b;">
            No patient linked
          </span>
        </div>
        <div class="appt-reason"
             th:if="${slot.appointmentReason != null
               and !slot.appointmentReason.isEmpty()}"
             th:text="'Reason: '
               + ${slot.appointmentReason}">
          Reason
        </div>
      </div>
      <span class="pill pill-blue">Booked</span>
    </div>
  </div>

  <div class="empty-state"
       th:if="${#lists.isEmpty(appointments)}">
    <span>📅</span>
    <p style="font-size:15px;font-weight:500;
               margin-bottom:6px;">
      No appointments yet
    </p>
    <p style="font-size:13px;">
      Appointments booked by the receptionist
      will appear here.
    </p>
  </div>

</div>
</body>
</html>
