<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Pending Orders</title>
    <style>
        .orders-header{display:flex;justify-content:space-between;
          align-items:center;margin-bottom:24px;}
        .filter-tabs{display:flex;gap:6px;margin-bottom:20px;}
        .tab{padding:7px 18px;border-radius:20px;font-size:12px;
          font-weight:500;border:1.5px solid var(--border);
          background:white;color:var(--muted);cursor:pointer;
          transition:all 0.15s;}
        .tab.active,.tab:hover{background:#1d4ed8;
          border-color:#1d4ed8;color:white;}
        .order-card{background:white;border-radius:14px;
          border:1px solid var(--border);padding:20px 24px;
          margin-bottom:12px;transition:box-shadow 0.2s;}
        .order-card:hover{box-shadow:0 4px 20px rgba(0,0,0,0.07);}
        .order-header{display:flex;justify-content:space-between;
          align-items:flex-start;margin-bottom:14px;}
        .order-code{font-size:14px;font-weight:600;color:var(--text);}
        .order-meta{display:flex;gap:16px;margin-bottom:14px;flex-wrap:wrap;}
        .order-meta-item{font-size:12px;color:var(--muted);
          display:flex;align-items:center;gap:5px;}
        .order-meta-item i{color:#1d4ed8;}
        .order-tests{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
        .test-chip{padding:4px 12px;background:#eff6ff;
          border-radius:20px;font-size:11px;font-weight:500;color:#1d4ed8;}
        .order-actions{display:flex;gap:8px;}
        .btn-confirm{background:#1d4ed8;color:white;border:none;
          border-radius:8px;padding:8px 20px;font-size:13px;
          font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;
          display:flex;align-items:center;gap:6px;transition:opacity 0.2s;}
        .btn-confirm:hover{opacity:.85;}
        .btn-reject{background:#fee2e2;color:#991b1b;border:none;
          border-radius:8px;padding:8px 16px;font-size:13px;
          font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;}
        .btn-reject:hover{background:#dc2626;color:white;}
        .btn-view{background:#f8fafc;color:var(--muted);
          border:1px solid var(--border);border-radius:8px;
          padding:8px 16px;font-size:13px;cursor:pointer;
          font-family:'DM Sans',sans-serif;}
        .priority-urgent{background:#fee2e2;color:#991b1b;
          border:1px solid #fecaca;padding:3px 10px;
          border-radius:20px;font-size:11px;font-weight:600;}
        .priority-stat{background:#fef9c3;color:#92400e;
          border:1px solid #fde68a;padding:3px 10px;
          border-radius:20px;font-size:11px;font-weight:600;}
        .priority-normal{background:#f1f5f9;color:#475569;
          padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;}
        .note-box{background:#f8fafc;border-radius:8px;
          padding:10px 14px;font-size:12px;color:var(--muted);
          border-left:3px solid #dbeafe;margin-bottom:14px;}
        .empty-state{text-align:center;padding:60px;color:var(--muted);}
        .empty-state span{font-size:52px;display:block;margin-bottom:12px;}
        .stats-strip{display:grid;grid-template-columns:repeat(4,1fr);
          gap:12px;margin-bottom:24px;}
        .strip-card{background:white;border-radius:12px;
          border:1px solid var(--border);padding:16px 18px;
          display:flex;align-items:center;gap:12px;}
        .si{width:36px;height:36px;border-radius:9px;
          display:flex;align-items:center;justify-content:center;font-size:15px;}
        .si-amber{background:#fef9c3;color:#92400e;}
        .si-red{background:#fee2e2;color:#991b1b;}
        .si-blue{background:#dbeafe;color:#1d4ed8;}
        .si-green{background:#dcfce7;color:#15803d;}
    </style>
</head>
<body>
<div layout:fragment="content">

    <div class="orders-header">
        <div>
            <h4 style="margin:0;font-size:20px;font-weight:600;">
                Test Order Confirmations
            </h4>
            <p style="margin:4px 0 0;font-size:13px;color:var(--muted);">
                Review and confirm test orders created by reception
            </p>
        </div>
    </div>

    <div class="stats-strip">
        <div class="strip-card">
            <div class="si si-amber"><i class="bi bi-hourglass-split"></i></div>
            <div>
                <div style="font-size:20px;font-weight:600;"
                     th:text="${orders.size()}">0</div>
                <div style="font-size:12px;color:var(--muted);">Pending</div>
            </div>
        </div>
        <div class="strip-card">
            <div class="si si-red"><i class="bi bi-exclamation-circle"></i></div>
            <div>
                <div style="font-size:20px;font-weight:600;"
                     th:text="${#lists.isEmpty(orders)} ? 0 :
                       ${orders.?[priority == 'URGENT'].size()}">0</div>
                <div style="font-size:12px;color:var(--muted);">Urgent</div>
            </div>
        </div>
        <div class="strip-card">
            <div class="si si-blue"><i class="bi bi-check-circle"></i></div>
            <div>
                <div style="font-size:20px;font-weight:600;">—</div>
                <div style="font-size:12px;color:var(--muted);">Confirmed Today</div>
            </div>
        </div>
        <div class="strip-card">
            <div class="si si-green"><i class="bi bi-x-circle"></i></div>
            <div>
                <div style="font-size:20px;font-weight:600;">—</div>
                <div style="font-size:12px;color:var(--muted);">Cancelled Today</div>
            </div>
        </div>
    </div>

    <!-- Filter tabs -->
    <div class="filter-tabs">
        <button class="tab active"
                onclick="filterOrders('all',this)">All Orders</button>
        <button class="tab"
                onclick="filterOrders('URGENT',this)">🔴 Urgent</button>
        <button class="tab"
                onclick="filterOrders('STAT',this)">🟡 STAT</button>
        <button class="tab"
                onclick="filterOrders('NORMAL',this)">Normal</button>
    </div>

    <!-- Order cards — real data -->
    <div id="ordersList">

        <div th:if="${not #lists.isEmpty(orders)}">
            <div class="order-card"
                 th:each="o : ${orders}"
                 th:attr="data-priority=${o.priority}">
                <div class="order-header">
                    <div>
                        <div class="order-code"
                             th:text="${o.orderCode}">CODE</div>
                        <div style="font-size:13px;color:var(--muted);margin-top:2px;">
                            <span th:text="${o.patient.fullName}">Patient</span>
                            —
                            <span th:text="${o.patient.patientCode}">CODE</span>
                        </div>
                    </div>
                    <span th:switch="${o.priority}">
                        <span th:case="'URGENT'" class="priority-urgent">🔴 URGENT</span>
                        <span th:case="'STAT'"   class="priority-stat">🟡 STAT</span>
                        <span th:case="*"        class="priority-normal"
                              th:text="${o.priority}">NORMAL</span>
                    </span>
                </div>
                <div class="note-box" th:if="${o.clinicalNote}">
                    <i class="bi bi-chat-left-text"></i>
                    Clinical note: <span th:text="${o.clinicalNote}"></span>
                </div>
                <div class="order-meta">
                    <span class="order-meta-item">
                        <i class="bi bi-clock"></i>
                        <span th:text="${#temporals.format(o.orderedAt,
                                         'dd MMM yyyy HH:mm')}">Date</span>
                    </span>
                    <span class="order-meta-item"
                          th:if="${o.createdBy != null}">
                        <i class="bi bi-person"></i>
                        Rec:
                        <span th:text="${o.createdBy.fullName}">Rec</span>
                    </span>
                </div>
                <div class="order-tests">
                    <span class="test-chip"
                          th:each="item : ${o.items}"
                          th:text="${item.test.testName}">Test</span>
                </div>
                <div class="order-actions">
                    <form th:action="@{/doctor/orders/{id}/confirm(id=${o.id})}"
                          method="post" style="display:inline;">
                        <input type="hidden"
                               th:name="${_csrf.parameterName}"
                               th:value="${_csrf.token}"/>
                        <button type="submit" class="btn-confirm">
                            <i class="bi bi-check-lg"></i> Confirm Order
                        </button>
                    </form>
                    <form th:action="@{/doctor/orders/{id}/reject(id=${o.id})}"
                          method="post" style="display:inline;">
                        <input type="hidden"
                               th:name="${_csrf.parameterName}"
                               th:value="${_csrf.token}"/>
                        <button type="submit" class="btn-reject">Reject</button>
                    </form>
                </div>
            </div>
        </div>

    </div>

    <div class="empty-state" id="emptyOrders"
         th:if="${#lists.isEmpty(orders)}">
        <span>📋</span>
        <p style="font-size:15px;font-weight:500;margin-bottom:6px;">
            No pending orders
        </p>
        <p style="font-size:13px;">
            Test orders assigned to your patients will appear here.
        </p>
    </div>

</div>
<th:block layout:fragment="scripts">
    <script>
        function filterOrders(priority, tab) {
            document.querySelectorAll('.tab').forEach(t =>
                t.classList.remove('active'));
            tab.classList.add('active');

            const cards = document.querySelectorAll('.order-card');
            let visible = 0;
            cards.forEach(c => {
                const match = priority === 'all' ||
                    c.dataset.priority === priority;
                c.style.display = match ? '' : 'none';
                if (match) visible++;
            });
            document.getElementById('emptyOrders').style.display =
                visible === 0 ? '' : 'none';
        }
    </script>
</th:block>
</body>
</html>
