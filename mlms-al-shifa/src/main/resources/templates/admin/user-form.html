<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title th:text="${user != null} ? 'Edit User' : 'Add User'">
        User Form
    </title>
    <style>
        .form-card{background:white;border-radius:16px;
          border:1px solid var(--border);padding:32px;
          max-width:640px;}
        .form-header{margin-bottom:28px;}
        .form-header h4{font-size:18px;font-weight:600;
          color:var(--text);margin:0 0 4px;}
        .form-header p{font-size:13px;color:var(--muted);margin:0;}
        .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
        .fg{margin-bottom:4px;}
        .fg.full{grid-column:1/-1;}
        .fg label{display:block;font-size:12px;font-weight:500;
          color:var(--text);margin-bottom:6px;}
        .fg input,.fg select{width:100%;border:1.5px solid var(--border);
          border-radius:9px;padding:9px 13px;font-size:13px;
          font-family:'DM Sans',sans-serif;color:var(--text);
          outline:none;transition:border-color 0.2s;
          background:white;}
        .fg input:focus,.fg select:focus{border-color:#0a5c7f;}
        .fg input[readonly]{background:#f8fafc;color:var(--muted);}
        .form-actions{display:flex;gap:10px;margin-top:24px;
          padding-top:20px;border-top:1px solid var(--border);}
        .btn-primary{background:#0a5c7f;color:white;border:none;
          border-radius:10px;padding:10px 24px;font-size:14px;
          font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;
          transition:opacity 0.2s;}
        .btn-primary:hover{opacity:.85;}
        .btn-secondary{background:#f1f5f9;color:var(--text);border:none;
          border-radius:10px;padding:10px 20px;font-size:14px;
          font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;
          text-decoration:none;display:inline-flex;align-items:center;}
        .role-doctor-note{background:#eff6ff;border:1px solid #bfdbfe;
          border-radius:10px;padding:14px 18px;font-size:13px;
          color:#1e40af;margin-top:16px;grid-column:1/-1;
          display:none;}
        .role-doctor-note.show{display:block;}
        .section-divider{grid-column:1/-1;border:none;
          border-top:1px dashed var(--border);margin:8px 0;}
    </style>
</head>
<body>
<div layout:fragment="content">

    <div style="margin-bottom:20px;">
        <a th:href="@{/admin/users}"
           style="font-size:13px;color:#0a5c7f;text-decoration:none;
              display:inline-flex;align-items:center;gap:4px;">
            <i class="bi bi-arrow-left"></i> Back to Users
        </a>
    </div>

    <div class="alert-flash alert-error"
         th:if="${error}" th:text="${error}"></div>

    <div class="form-card">
        <div class="form-header">
            <h4 th:text="${user != null} ? '✏️ Edit User' : '➕ Create New User'">
                User Form
            </h4>
            <p th:text="${user != null}
         ? 'Update this user\'s information and role'
         : 'Fill in the details to create a new system user'">
                Instructions
            </p>
        </div>

        <form th:action="${user != null}
          ? @{/admin/users/{id}/edit(id=${user.id})}
          : @{/admin/users/new}"
              method="post">

            <input type="hidden"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}"/>

            <div class="form-grid">

                <!-- Full Name -->
                <div class="fg full">
                    <label>Full Name *</label>
                    <input type="text" name="fullName" required
                           placeholder="e.g. Dr. Ahmad Al-Hassan"
                           th:value="${user?.fullName}"/>
                </div>

                <!-- Username -->
                <div class="fg">
                    <label>Username *</label>
                    <input type="text" name="username"
                           th:required="${user == null}"
                           placeholder="e.g. ahmadh"
                           th:value="${user?.username}"
                           th:readonly="${user != null}"/>
                </div>

                <!-- Role -->
                <div class="fg">
                    <label>Role *</label>
                    <select name="role" required
                            onchange="checkDoctorRole(this.value)">
                        <option value="">— Select role —</option>
                        <option value="ROLE_RECEPTIONIST"
                                th:selected="${user != null
                      and user.roles.iterator().next().name
                      == 'ROLE_RECEPTIONIST'}">
                            Receptionist
                        </option>
                        <option value="ROLE_DOCTOR"
                                th:selected="${user != null
                      and user.roles.iterator().next().name
                      == 'ROLE_DOCTOR'}">
                            Doctor
                        </option>
                        <option value="ROLE_LAB_TECHNICIAN"
                                th:selected="${user != null
                      and user.roles.iterator().next().name
                      == 'ROLE_LAB_TECHNICIAN'}">
                            Lab Technician
                        </option>
                        <option value="ROLE_ADMIN"
                                th:selected="${user != null
                      and user.roles.iterator().next().name
                      == 'ROLE_ADMIN'}">
                            Administrator
                        </option>
                    </select>
                </div>

                <!-- Password (only for create) -->
                <div class="fg" th:if="${user == null}">
                    <label>Password *</label>
                    <input type="password" name="password" required
                           placeholder="Min. 8 characters"/>
                </div>

                <div class="fg" th:if="${user == null}">
                    <label>Confirm Password *</label>
                    <input type="password" id="confirmPwd"
                           placeholder="Repeat password"/>
                </div>

                <hr class="section-divider"/>

                <!-- Email -->
                <div class="fg">
                    <label>Email Address</label>
                    <input type="email" name="email"
                           placeholder="user@alshifa.td"
                           th:value="${user?.email}"/>
                </div>

                <!-- Phone -->
                <div class="fg">
                    <label>Phone Number</label>
                    <input type="tel" name="phone"
                           placeholder="+235 00 00 00 00"
                           th:value="${user?.phone}"/>
                </div>

                <!-- Doctor-specific fields -->
                <div class="role-doctor-note" id="doctorNote">
                    <strong>🩺 Doctor selected</strong> — After creating this user,
                    go to their profile in the Users list and add their
                    clinical details (specialization, department, license,
                    qualifications and bio) via the
                    <strong>Edit → Doctor Profile</strong> section.
                </div>

            </div>

            <div class="form-actions">
                <a th:href="@{/admin/users}"
                   class="btn-secondary">
                    Cancel
                </a>
                <button type="submit" class="btn-primary">
          <span th:text="${user != null}
                ? 'Update User' : 'Create User'">
            Save
          </span>
                </button>
            </div>

        </form>
    </div>

</div>
<th:block layout:fragment="scripts">
    <script>
        function checkDoctorRole(val) {
            const note = document.getElementById('doctorNote');
            note.classList.toggle('show', val === 'ROLE_DOCTOR');
        }

        // Initialize on page load if editing a doctor
        document.addEventListener('DOMContentLoaded', () => {
            const sel = document.querySelector('select[name="role"]');
            if (sel) checkDoctorRole(sel.value);
        });
    </script>
</th:block>
</body>
</html>
