<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
  <title>Departments</title>
  <style>
    .page-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 24px;
    }
    .btn-primary {
        background: var(--primary);
        color: white;
        border: none;
        border-radius: 10px;
        padding: 9px 20px;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        font-family: 'DM Sans', sans-serif;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        transition: opacity 0.2s;
    }
    .btn-primary:hover { opacity: .85; color: white; }
    .dept-grid {
        display: grid;
        grid-template-columns: repeat(
            auto-fill, minmax(260px, 1fr));
        gap: 16px;
        margin-bottom: 28px;
    }
    .dept-card {
        background: white;
        border-radius: 14px;
        border: 1px solid var(--border);
        padding: 22px;
        transition: box-shadow 0.2s, transform 0.2s;
    }
    .dept-card:hover {
        box-shadow: 0 4px 20px rgba(0,0,0,0.07);
        transform: translateY(-1px);
    }
    .dept-icon {
        width: 44px; height: 44px;
        background: var(--primary);
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        color: white;
        margin-bottom: 14px;
    }
    .dept-name {
        font-size: 15px;
        font-weight: 600;
        color: var(--text);
        margin-bottom: 6px;
    }
    .dept-desc {
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 14px;
        min-height: 32px;
    }
    .dept-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
    }
    .empty-state {
        text-align: center;
        padding: 60px;
        color: var(--muted);
    }
    .empty-state span {
        font-size: 52px;
        display: block;
        margin-bottom: 12px;
    }

    /* Modal */
    .modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.45);
        z-index: 2000;
        align-items: center;
        justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
        background: white;
        border-radius: 16px;
        padding: 28px;
        width: 100%;
        max-width: 440px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .modal-box h4 {
        font-size: 16px;
        font-weight: 600;
        margin: 0 0 20px;
    }
    .fg { margin-bottom: 14px; }
    .fg label {
        display: block;
        font-size: 12px;
        font-weight: 500;
        margin-bottom: 6px;
    }
    .fg input, .fg select, .fg textarea {
        width: 100%;
        border: 1.5px solid var(--border);
        border-radius: 9px;
        padding: 9px 13px;
        font-size: 13px;
        font-family: 'DM Sans', sans-serif;
        outline: none;
        transition: border-color 0.2s;
    }
    .fg input:focus, .fg textarea:focus {
        border-color: var(--primary);
    }
    .modal-footer {
        display: flex;
        gap: 10px;
        justify-content: flex-end;
        margin-top: 20px;
    }
    .btn-cancel {
        background: #f1f5f9;
        color: var(--text);
        border: none;
        border-radius: 9px;
        padding: 9px 18px;
        font-size: 13px;
        cursor: pointer;
        font-family: 'DM Sans', sans-serif;
    }
    .confirm-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.45);
        z-index: 3000;
        align-items: center;
        justify-content: center;
    }
    .confirm-overlay.open { display: flex; }
    .confirm-box {
        background: white;
        border-radius: 14px;
        padding: 28px;
        max-width: 360px;
        width: 100%;
        text-align: center;
    }
    .confirm-box h4 {
        font-size: 15px;
        font-weight: 600;
        margin: 0 0 10px;
    }
    .confirm-box p {
        font-size: 13px;
        color: var(--muted);
        margin: 0 0 22px;
    }
    .confirm-actions {
        display: flex;
        gap: 10px;
        justify-content: center;
    }
    .btn-confirm-yes {
        background: #dc2626;
        color: white;
        border: none;
        border-radius: 9px;
        padding: 9px 20px;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
    }
    .btn-confirm-no {
        background: #f1f5f9;
        color: var(--text);
        border: none;
        border-radius: 9px;
        padding: 9px 18px;
        font-size: 13px;
        cursor: pointer;
    }
  </style>
</head>
<body>
<div layout:fragment="content">

  <div class="page-header">
    <div>
      <h4 style="margin:0;font-size:20px;
                        font-weight:600;">
        Departments
      </h4>
      <p style="margin:4px 0 0;font-size:13px;
                       color:var(--muted);">
        Manage laboratory departments
      </p>
    </div>
    <button class="btn-primary"
            type="button"
            onclick="openModal('deptModal')">
      <i class="bi bi-plus-lg"></i>
      Add Department
    </button>
  </div>

  <!-- Departments grid -->
  <div class="dept-grid"
       th:if="${not #lists.isEmpty(departments)}">
    <div class="dept-card"
         th:each="d : ${departments}">
      <div class="dept-icon">🏥</div>
      <div class="dept-name"
           th:text="${d.name}">
        Department
      </div>
      <div class="dept-desc"
           th:text="${d.description ?: 'No description provided.'}">
        Description
      </div>
      <div style="margin-bottom:12px;">
                <span class="pill"
                      th:classappend="${d.active}
                        ? 'pill-green' : 'pill-red'"
                      th:text="${d.active}
                        ? '● Active' : '● Inactive'">
                </span>
      </div>
      <div class="dept-actions">
        <!-- Toggle active -->
        <form th:action="@{/admin/departments/
                        {id}/toggle(id=${d.id})}"
              method="post"
              style="display:inline;">
          <input type="hidden"
                 th:name="${_csrf.parameterName}"
                 th:value="${_csrf.token}"/>
          <button type="submit"
                  class="btn-xs"
                  th:classappend="${d.active}
                              ? 'btn-danger-xs'
                              : 'btn-primary-xs'"
                  th:text="${d.active}
                              ? 'Deactivate'
                              : 'Activate'">
          </button>
        </form>
        <!-- Delete -->
        <button class="btn-xs btn-danger-xs js-delete-dept"
                th:data-id="${d.id}"
                th:data-name="${d.name}">
          <i class="bi bi-trash"></i> Delete
        </button>
      </div>
    </div>
  </div>

  <div class="empty-state"
       th:if="${#lists.isEmpty(departments)}">
    <span>🏢</span>
    <p style="font-size:15px;font-weight:500;
                   margin-bottom:6px;">
      No departments yet
    </p>
    <p style="font-size:13px;">
      Click "Add Department" to create the first one.
    </p>
  </div>

  <!-- ══ Add Department Modal ══ -->
  <div class="modal-overlay" id="deptModal">
    <div class="modal-box">
      <div style="display:flex;justify-content:space-between;
                  align-items:center;margin-bottom:16px;">
        <h4 style="margin:0;">🏥 Add New Department</h4>
        <button type="button"
                style="background:none;border:none;
                       font-size:22px;cursor:pointer;
                       color:var(--muted);line-height:1;"
                onclick="closeModal('deptModal')">×</button>
      </div>
      <form th:action="@{/admin/departments/new}"
            method="post">
        <input type="hidden"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}"/>
        <div class="fg">
          <label>Department Name *</label>
          <input type="text"
                 name="name"
                 required
                 placeholder="e.g. Hematology"/>
        </div>
        <div class="fg">
          <label>Description</label>
          <textarea name="description"
                    rows="3"
                    placeholder="Brief description...">
                    </textarea>
        </div>
        <div class="modal-footer">
          <button type="button"
                  class="btn-cancel"
                  onclick="closeModal(
                              'deptModal')">
            Cancel
          </button>
          <button type="submit"
                  class="btn-primary">
            Create Department
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- ══ Delete Confirmation ══ -->
  <div class="confirm-overlay" id="deleteDeptConfirm">
    <div class="confirm-box">
      <div style="font-size:36px;
                         margin-bottom:12px;">🗑️</div>
      <h4>Delete Department</h4>
      <p id="deleteDeptMsg">
        Are you sure? This cannot be undone.
      </p>
      <div class="confirm-actions">
        <button class="btn-confirm-no"
                onclick="closeDeleteDept()">
          Cancel
        </button>
        <form id="deleteDeptForm"
              method="post"
              style="display:inline;">
          <input type="hidden"
                 th:name="${_csrf.parameterName}"
                 th:value="${_csrf.token}"/>
          <button type="submit"
                  class="btn-confirm-yes">
            Delete
          </button>
        </form>
      </div>
    </div>
  </div>

</div>
<th:block layout:fragment="scripts">
  <script>
    function openModal(id) {
        var el = document.getElementById(id);
        if (el) el.classList.add('open');
    }
    function closeModal(id) {
        var el = document.getElementById(id);
        if (el) el.classList.remove('open');
    }
    document.querySelectorAll(
        '.modal-overlay, .confirm-overlay').forEach(function(o) {
        o.addEventListener('click', function(e) {
            if (e.target === o) o.classList.remove('open');
        });
    });
    function closeDeleteDept() {
        document.getElementById('deleteDeptConfirm')
            .classList.remove('open');
    }
    // Use event delegation for delete buttons
    document.addEventListener('click', function(e) {
        var btn = e.target.closest('.js-delete-dept');
        if (!btn) return;
        var deptId   = btn.dataset.id;
        var deptName = btn.dataset.name;
        document.getElementById('deleteDeptMsg').textContent =
            'Delete "' + deptName + '"? This cannot be undone.';
        document.getElementById('deleteDeptForm').action =
            '/admin/departments/' + deptId + '/delete';
        document.getElementById('deleteDeptConfirm')
            .classList.add('open');
    });
  </script>
</th:block>
</body>
</html>
