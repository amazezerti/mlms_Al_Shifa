<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title>User Management</title>
    <style>
        .users-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .btn-add {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 10px 22px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            display: inline-flex;
            align-items: center;
            gap: 7px;
            transition: opacity 0.2s;
        }
        .btn-add:hover { opacity: .85; }
        .search-wrap {
            margin-bottom: 20px;
        }
        .search-input {
            width: 100%;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            padding: 10px 18px;
            font-size: 13px;
            font-family: 'DM Sans', sans-serif;
            outline: none;
            transition: border-color 0.2s;
            background: white;
        }
        .search-input:focus {
            border-color: var(--primary);
        }
        .avatar-sm {
            width: 34px; height: 34px;
            border-radius: 9px;
            background: var(--primary);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            color: white;
            margin-right: 10px;
            text-transform: uppercase;
            flex-shrink: 0;
            vertical-align: middle;
        }
        .sys-badge {
            background: #fef3c7;
            color: #92400e;
            font-size: 10px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 20px;
            margin-left: 4px;
            vertical-align: middle;
        }
        .protected-label {
            font-size: 12px;
            color: #92400e;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        /* Modals */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.open { display: flex; }
        .modal-box {
            background: white;
            border-radius: 16px;
            padding: 28px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.25);
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .modal-header h4 {
            margin: 0;
            font-size: 16px;
            font-weight: 600;
            color: var(--text);
        }
        .modal-close {
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            color: var(--muted);
            line-height: 1;
            padding: 0;
        }
        .modal-close:hover { color: var(--text); }
        .fg { margin-bottom: 14px; }
        .fg label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 6px;
        }
        .fg input, .fg select {
            width: 100%;
            border: 1.5px solid var(--border);
            border-radius: 9px;
            padding: 9px 13px;
            font-size: 13px;
            font-family: 'DM Sans', sans-serif;
            outline: none;
            transition: border-color 0.2s;
            background: white;
            box-sizing: border-box;
        }
        .fg input:focus, .fg select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(18,130,162,0.1);
        }
        .modal-footer {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }
        .btn-cancel {
            background: #f1f5f9;
            color: var(--text);
            border: none;
            border-radius: 9px;
            padding: 9px 18px;
            font-size: 13px;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
        }
        .btn-cancel:hover { background: #e2e8f0; }
        .btn-submit {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 9px;
            padding: 9px 20px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            transition: opacity 0.2s;
        }
        .btn-submit:hover { opacity: 0.85; }
        .btn-submit-danger {
            background: #dc2626;
            color: white;
            border: none;
            border-radius: 9px;
            padding: 9px 20px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
        }
        .fg-2col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .confirm-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 3000;
            align-items: center;
            justify-content: center;
        }
        .confirm-overlay.open { display: flex; }
        .confirm-box {
            background: white;
            border-radius: 16px;
            padding: 32px;
            max-width: 380px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.25);
        }
    </style>
</head>
<body>
<div layout:fragment="content">

    <div class="users-header">
        <div>
            <h4 style="margin:0;font-size:20px;
                        font-weight:600;
                        color:var(--text);">
                User Management
            </h4>
            <p style="margin:6px 0 0;font-size:13px;
                       color:var(--muted);">
                Create, edit and manage all system users
            </p>
        </div>
        <button type="button"
                class="btn-add"
                onclick="openModal('createModal')">
            <i class="bi bi-plus-lg"></i> Add User
        </button>
    </div>

    <!-- Server-side search -->
    <form th:action="@{/admin/users}" method="get"
          style="margin-bottom:20px;">
        <div style="display:flex;gap:10px;">
            <input type="text"
                   class="search-input"
                   name="q"
                   th:value="${q}"
                   autocomplete="off"
                   placeholder="Search by name or username..."
                   style="flex:1;"/>
            <button type="submit"
                    class="btn-add"
                    style="white-space:nowrap;">
                <i class="bi bi-search"></i> Search
            </button>
            <a th:if="${q != null and !q.isEmpty()}"
               th:href="@{/admin/users}"
               class="btn-add"
               style="background:#6b7280;text-decoration:none;">
                <i class="bi bi-x-lg"></i> Clear
            </a>
        </div>
    </form>

    <div class="content-card">
        <div style="overflow-x:auto;">
            <table class="data-table" id="usersTable">
                <thead>
                <tr>
                    <th>User</th>
                    <th>Role</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>

                <!--
                    th:each iterates ALL users.
                    With FetchType.EAGER on roles,
                    every user row renders correctly.
                    The null-safe isEmpty() check
                    prevents errors on users with
                    no roles assigned.
                -->
                <tr th:each="u : ${users}">
                    <td>
                        <div style="display:flex;
                                     align-items:center;">
                            <span class="avatar-sm"
                                  th:text="${u.fullName.length() > 1
                                    ? u.fullName.substring(0,2)
                                    : u.fullName}">
                                AB
                            </span>
                            <div>
                                <div style="font-weight:500;
                                  font-size:13px;">
                                    <span th:text="${u
                                        .fullName}">
                                        Name
                                    </span>
                                    <span class="sys-badge"
                                          th:if="${u
                                            .username
                                            == protectedAdmin}">
                                        🔒 SYSTEM
                                    </span>
                                </div>
                                <div style="font-size:11px;
                                  color:var(--muted);
                                  margin-top:1px;"
                                     th:text="'@'
                                       + ${u.username}">
                                    @user
                                </div>
                            </div>
                        </div>
                    </td>
                    <td>
                        <span th:if="${not u.roles
                                .isEmpty()}"
                              class="pill pill-blue"
                              th:text="${u.roles
                                .iterator().next()
                                .name
                                .replace('ROLE_','')}">
                            ROLE
                        </span>
                        <span th:if="${u.roles.isEmpty()}"
                              class="pill pill-gray">
                            —
                        </span>
                    </td>
                    <td style="font-size:13px;"
                        th:text="${u.email ?: '—'}">
                        —
                    </td>
                    <td style="font-size:13px;"
                        th:text="${u.phone ?: '—'}">
                        —
                    </td>
                    <td>
                        <span class="pill"
                              th:classappend="${u.enabled}
                                ? 'pill-green'
                                : 'pill-red'"
                              th:text="${u.enabled}
                                ? '● Active'
                                : '● Inactive'">
                        </span>
                    </td>
                    <td>

                        <!-- SYSTEM ADMIN: no actions -->
                        <span th:if="${u.username
                                == protectedAdmin}"
                              class="protected-label">
                            <i class="bi bi-lock-fill"></i>
                            Protected
                        </span>

                        <!-- ALL OTHER USERS: full actions -->
                        <div th:if="${u.username
                               != protectedAdmin}"
                             style="display:flex;
                                     gap:5px;
                                     flex-wrap:wrap;
                                     align-items:center;">

                            <!-- Edit -->
                            <a th:href="@{/admin/users/
                                  {id}/edit(id=${u.id})}"
                               class="btn-xs
                                      btn-outline-xs"
                               title="Edit user">
                                <i class="bi bi-pencil">
                                </i>
                            </a>

                            <!-- Activate / Deactivate -->
                            <form th:action="@{
                                    /admin/users/{id}
                                    /toggle(id=${u.id})}"
                                  method="post"
                                  style="display:inline;
                                          margin:0;">
                                <input type="hidden"
                                       th:name="${_csrf
                                    .parameterName}"
                                       th:value="${_csrf
                                    .token}"/>
                                <button type="submit"
                                        class="btn-xs"
                                        th:classappend="${u
                                    .enabled}
                                    ? 'btn-danger-xs'
                                    : 'btn-primary-xs'"
                                        th:text="${u.enabled}
                                    ? 'Deactivate'
                                    : 'Activate'">
                                </button>
                            </form>

                            <!-- Reset password -->
                            <button type="button"
                                    class="btn-xs
                                           btn-outline-xs
                                           open-reset-btn"
                                    title="Reset password"
                                    th:data-user-id="${u.id}">
                                <i class="bi bi-key"></i>
                            </button>

                            <!-- Doctor profile -->
                            <a th:if="${not u.roles
                                  .isEmpty()
                                  and u.roles.iterator()
                                    .next().name
                                    == 'ROLE_DOCTOR'}"
                               th:href="@{/admin/users/
                                  {id}/doctor-profile(
                                  id=${u.id})}"
                               class="btn-xs
                                      btn-outline-xs"
                               title="Doctor profile">
                                <i class="bi
                                    bi-person-badge">
                                </i>
                            </a>

                            <!-- Doctor availability -->
                            <a th:if="${not u.roles
                                  .isEmpty()
                                  and u.roles.iterator()
                                    .next().name
                                    == 'ROLE_DOCTOR'}"
                               th:href="@{/admin/users/
                                  {id}/availability(
                                  id=${u.id})}"
                               class="btn-xs
                                      btn-outline-xs"
                               title="Availability slots">
                                <i class="bi
                                    bi-calendar-plus">
                                </i>
                            </a>

                            <!-- Delete -->
                            <button type="button"
                                    class="btn-xs
                                           btn-danger-xs
                                           open-delete-btn"
                                    title="Delete user"
                                    th:data-user-id="${u.id}"
                                    th:data-user-name="${u.fullName}">
                                <i class="bi bi-trash">
                                </i>
                            </button>

                        </div>
                    </td>
                </tr>

                <!-- Empty state -->
                <tr th:if="${users.isEmpty()}">
                    <td colspan="6"
                        style="text-align:center;
                               padding:40px;
                               color:var(--muted);">
                        <div style="font-size:36px;
                                     margin-bottom:10px;">
                            👥
                        </div>
                        No users found.
                    </td>
                </tr>

                </tbody>
            </table>
        </div>
    </div>

    <!-- ══ Create User Modal ══ -->
    <div class="modal-overlay" id="createModal">
        <div class="modal-box">
            <div class="modal-header">
                <h4>➕ Add New User</h4>
                <button type="button"
                        class="modal-close"
                        onclick="closeModal(
                          'createModal')">
                    ×
                </button>
            </div>
            <form th:action="@{/admin/users/new}"
                  method="post">
                <input type="hidden"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}"/>
                <div class="fg">
                    <label>Full Name *</label>
                    <input type="text"
                           name="fullName"
                           required
                           placeholder="e.g. Dr. Ahmad Hassan"/>
                </div>
                <div class="fg-2col">
                    <div class="fg">
                        <label>Username *</label>
                        <input type="text"
                               name="username"
                               required
                               placeholder="e.g. ahmadh"/>
                    </div>
                    <div class="fg">
                        <label>Password *</label>
                        <input type="password"
                               name="password"
                               required
                               placeholder="Min 8 chars"/>
                    </div>
                </div>
                <div class="fg-2col">
                    <div class="fg">
                        <label>Email</label>
                        <input type="email"
                               name="email"
                               placeholder="user@alshifa.td"/>
                    </div>
                    <div class="fg">
                        <label>Phone</label>
                        <input type="tel"
                               name="phone"
                               placeholder="+235 66 00 00"/>
                    </div>
                </div>
                <div class="fg">
                    <label>Role *</label>
                    <select name="role" required>
                        <option value="">
                            — Select role —
                        </option>
                        <option value="ROLE_RECEPTIONIST">
                            Receptionist
                        </option>
                        <option value="ROLE_DOCTOR">
                            Doctor
                        </option>
                        <option value="ROLE_LAB_TECHNICIAN">
                            Lab Technician
                        </option>
                        <option value="ROLE_ADMIN">
                            Administrator
                        </option>
                    </select>
                </div>
                <div class="modal-footer">
                    <button type="button"
                            class="btn-cancel"
                            onclick="closeModal(
                              'createModal')">
                        Cancel
                    </button>
                    <button type="submit"
                            class="btn-submit">
                        Create User
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- ══ Reset Password Modal ══ -->
    <div class="modal-overlay" id="resetModal">
        <div class="modal-box">
            <div class="modal-header">
                <h4>🔑 Reset Password</h4>
                <button type="button"
                        class="modal-close"
                        onclick="closeModal(
                          'resetModal')">
                    ×
                </button>
            </div>
            <form id="resetForm" method="post">
                <input type="hidden"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}"/>
                <div class="fg">
                    <label>New Password *</label>
                    <input type="password"
                           name="newPassword"
                           required
                           placeholder="Minimum 8 characters"/>
                </div>
                <div class="modal-footer">
                    <button type="button"
                            class="btn-cancel"
                            onclick="closeModal(
                              'resetModal')">
                        Cancel
                    </button>
                    <button type="submit"
                            class="btn-submit">
                        Reset Password
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- ══ Delete Confirmation Modal ══ -->
    <div class="confirm-overlay" id="deleteModal">
        <div class="confirm-box">
            <div style="font-size:44px;
                         margin-bottom:14px;">
                🗑️
            </div>
            <h4 style="margin:0 0 10px;font-size:17px;
                        font-weight:600;">
                Delete User
            </h4>
            <p id="deleteMsg"
               style="font-size:13px;
                       color:var(--muted);
                       margin:0 0 24px;
                       line-height:1.6;">
                Are you sure? This cannot be undone.
            </p>
            <div style="display:flex;gap:10px;
                         justify-content:center;">
                <button type="button"
                        class="btn-cancel"
                        onclick="closeDelete()">
                    Cancel
                </button>
                <form id="deleteForm"
                      method="post"
                      style="display:inline;margin:0;">
                    <input type="hidden"
                           th:name="${_csrf.parameterName}"
                           th:value="${_csrf.token}"/>
                    <button type="submit"
                            class="btn-submit-danger">
                        Delete
                    </button>
                </form>
            </div>
        </div>
    </div>

</div>
<th:block layout:fragment="scripts">
    <script>
        // ── Modal helpers ─────────────────────────────────────────────
        function openModal(id) {
            var el = document.getElementById(id);
            if (el) el.classList.add('open');
        }
        function closeModal(id) {
            var el = document.getElementById(id);
            if (el) el.classList.remove('open');
        }

        // Close modals on backdrop click
        document.querySelectorAll(
            '.modal-overlay, .confirm-overlay')
            .forEach(function(o) {
                o.addEventListener('click', function(e) {
                    if (e.target === o) {
                        o.classList.remove('open');
                    }
                });
            });

        // ── Reset password & Delete — event delegation ───────────────
        // Using data-attributes avoids inline onclick breakage
        // when fullName contains apostrophes or quotes.
        document.addEventListener('click', function(e) {
            var resetBtn = e.target.closest('.open-reset-btn');
            if (resetBtn) {
                document.getElementById('resetForm').action =
                    '/admin/users/' + resetBtn.dataset.userId
                    + '/reset-password';
                openModal('resetModal');
                return;
            }
            var deleteBtn = e.target.closest('.open-delete-btn');
            if (deleteBtn) {
                document.getElementById('deleteMsg').textContent =
                    'Delete "' + deleteBtn.dataset.userName
                    + '"? This action cannot be undone.';
                document.getElementById('deleteForm').action =
                    '/admin/users/' + deleteBtn.dataset.userId
                    + '/delete';
                document.getElementById('deleteModal')
                    .classList.add('open');
            }
        });

        function closeDelete() {
            document.getElementById('deleteModal')
                .classList.remove('open');
        }

        // Client-side filter removed: modern browsers fire
        // the 'input' event during autofill even with
        // autocomplete="off", which caused all table rows
        // to be hidden on page load. Search is server-side.
    </script>
</th:block>
</body>
</html>
