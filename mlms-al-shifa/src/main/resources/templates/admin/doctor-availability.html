<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Manage Availability</title>
  <style>
    .avail-layout{display:grid;
      grid-template-columns:320px 1fr;gap:20px;align-items:start;}
    .add-slot-card{background:white;border-radius:14px;
      border:1px solid var(--border);padding:22px;
      position:sticky;top:80px;}
    .add-slot-card h5{font-size:14px;font-weight:600;
      margin:0 0 18px;}
    .fg{margin-bottom:14px;}
    .fg label{display:block;font-size:12px;font-weight:500;
      margin-bottom:6px;}
    .fg input{width:100%;border:1.5px solid var(--border);
      border-radius:9px;padding:8px 12px;font-size:13px;
      font-family:'DM Sans',sans-serif;outline:none;}
    .fg input:focus{border-color:#0a5c7f;}
    .btn-primary{background:#0a5c7f;color:white;border:none;
      border-radius:9px;padding:9px 20px;font-size:13px;
      font-weight:500;cursor:pointer;width:100%;
      font-family:'DM Sans',sans-serif;}
    .slot-card{background:white;border-radius:12px;
      border:1px solid var(--border);padding:14px 18px;
      margin-bottom:10px;display:flex;align-items:center;
      gap:12px;transition:box-shadow 0.2s;}
    .slot-card:hover{box-shadow:0 4px 14px rgba(0,0,0,0.07);}
    .slot-date-badge{background:#f0f6fa;border-radius:8px;
      padding:8px 12px;text-align:center;flex-shrink:0;min-width:70px;}
    .slot-date-badge .day{font-size:18px;font-weight:600;
      color:#0a5c7f;line-height:1;}
    .slot-date-badge .month{font-size:10px;color:var(--muted);
      text-transform:uppercase;letter-spacing:0.05em;}
    .slot-time{font-size:14px;font-weight:600;color:var(--text);}
    .slot-sub{font-size:12px;color:var(--muted);margin-top:2px;}
    .user-badge-sm{display:flex;align-items:center;gap:10px;
      background:#f0f6fa;border-radius:10px;padding:12px 16px;
      margin-bottom:20px;}
    .user-av-sm{width:36px;height:36px;border-radius:50%;
      background:#0a5c7f;display:flex;align-items:center;
      justify-content:center;font-size:13px;font-weight:600;
      color:white;text-transform:uppercase;flex-shrink:0;}
    .empty-slots{text-align:center;padding:40px;color:var(--muted);}
    .empty-slots span{font-size:40px;display:block;margin-bottom:10px;}
  </style>
</head>
<body>
<div layout:fragment="content">

  <div style="margin-bottom:20px;">
    <a th:href="@{/admin/users}"
       style="font-size:13px;color:#0a5c7f;text-decoration:none;
              display:inline-flex;align-items:center;gap:4px;">
      <i class="bi bi-arrow-left"></i> Back to Users
    </a>
  </div>

  <div class="alert-flash alert-success"
       th:if="${success}" th:text="${success}"></div>
  <div class="alert-flash alert-error"
       th:if="${error}" th:text="${error}"></div>

  <div class="user-badge-sm">
    <div class="user-av-sm"
         th:text="${#strings.substring(user.fullName,0,2)}">DR</div>
    <div>
      <div style="font-size:13px;font-weight:600;"
           th:text="'Dr. '+user.fullName">Doctor Name</div>
      <div style="font-size:11px;color:var(--muted);">
        Availability slot management
      </div>
    </div>
  </div>

  <div class="avail-layout">

    <!-- Add slot form -->
    <div class="add-slot-card">
      <h5>➕ Add Availability Slot</h5>
      <form th:action="@{/admin/users/{id}/availability/add(id=${user.id})}"
            method="post">
        <input type="hidden"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}"/>
        <div class="fg">
          <label>Date *</label>
          <input type="date" name="slotDate" required
                 th:min="${today}"/>
        </div>
        <div class="fg">
          <label>Start Time *</label>
          <input type="time" name="startTime" required/>
        </div>
        <div class="fg">
          <label>End Time *</label>
          <input type="time" name="endTime" required/>
        </div>
        <button type="submit" class="btn-primary">
          <i class="bi bi-plus-lg"></i> Add Slot
        </button>
      </form>
    </div>

    <!-- Slots list -->
    <div>
      <div class="content-card">
        <div class="cc-header">
          <h5>Availability Slots — Next 30 Days</h5>
          <span style="font-size:12px;color:var(--muted);">
            <span th:text="${slots.size()}">0</span> slots
          </span>
        </div>
        <div class="cc-body" style="padding:16px 20px;">

          <div th:if="${not #lists.isEmpty(slots)}">
            <div class="slot-card"
                 th:each="slot : ${slots}">
              <div class="slot-date-badge">
                <div class="day"
                     th:text="${#temporals.format(slot.slotDate,'dd')}">
                  01
                </div>
                <div class="month"
                     th:text="${#temporals.format(slot.slotDate,'MMM')}">
                  Apr
                </div>
              </div>
              <div style="flex:1;">
                <div class="slot-time"
                     th:text="${#temporals.format(slot.startTime,'HH:mm')}
                               +' — '
                               +${#temporals.format(slot.endTime,'HH:mm')}">
                  09:00 — 09:30
                </div>
                <div class="slot-sub"
                     th:text="${#temporals.format(slot.slotDate,'EEEE, dd MMMM yyyy')}">
                  Monday, 01 April 2024
                </div>
              </div>
              <span class="pill"
                    th:classappend="${slot.booked}?'pill-red':'pill-green'"
                    th:text="${slot.booked}?'Booked':'Available'">
              </span>
            </div>
          </div>

          <div class="empty-slots"
               th:if="${#lists.isEmpty(slots)}">
            <span>📅</span>
            <p>No availability slots yet.</p>
            <p style="font-size:12px;">
              Use the form to add working slots for this doctor.
            </p>
          </div>

        </div>
      </div>
    </div>

  </div>

</div>
</body>
</html>
